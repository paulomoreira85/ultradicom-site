<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bgM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bgM)"/>

  <text x="300" y="50" font-family="Plus Jakarta Sans, sans-serif" font-size="22" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2">4 MODALIDADES</text>
  <text x="300" y="78" font-family="Inter, sans-serif" font-size="13" fill="#e8f0fe" text-anchor="middle">Imprima exames de qualquer equipamento DICOM</text>

  <!-- Quadrante: Raio-X -->
  <g transform="translate(60, 110)">
    <rect width="220" height="200" rx="14" fill="white" opacity="0.95"/>
    <text x="20" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0D47A1" letter-spacing="1.5">— 01</text>
    <text x="20" y="58" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="800" fill="#0a0a0a">RAIO-X</text>
    <text x="20" y="78" font-family="Inter, sans-serif" font-size="11" fill="#404040">Computed Radiography (CR)</text>
    <text x="20" y="92" font-family="Inter, sans-serif" font-size="11" fill="#404040">Digital Radiography (DR)</text>
    <!-- ícone -->
    <g transform="translate(150, 100)" opacity="0.9">
      <ellipse cx="30" cy="20" rx="20" ry="12" fill="#94a3b8"/>
      <rect x="22" y="30" width="16" height="60" fill="#cbd5e1" rx="4"/>
      <ellipse cx="30" cy="100" rx="25" ry="12" fill="#94a3b8"/>
      <rect x="14" y="98" width="32" height="40" fill="#94a3b8" rx="10"/>
      <line x1="26" y1="40" x2="26" y2="92" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="34" y1="40" x2="34" y2="92" stroke="#e2e8f0" stroke-width="1"/>
    </g>
  </g>

  <!-- Quadrante: Tomografia -->
  <g transform="translate(320, 110)">
    <rect width="220" height="200" rx="14" fill="white" opacity="0.95"/>
    <text x="20" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0D47A1" letter-spacing="1.5">— 02</text>
    <text x="20" y="58" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="800" fill="#0a0a0a">TOMOGRAFIA</text>
    <text x="20" y="78" font-family="Inter, sans-serif" font-size="11" fill="#404040">Computed Tomography (CT)</text>
    <text x="20" y="92" font-family="Inter, sans-serif" font-size="11" fill="#404040">Multislice e cone-beam</text>
    <!-- ícone tomógrafo -->
    <g transform="translate(140, 110)" opacity="0.9">
      <circle cx="40" cy="40" r="36" fill="none" stroke="#0D47A1" stroke-width="6"/>
      <circle cx="40" cy="40" r="22" fill="none" stroke="#94a3b8" stroke-width="2"/>
      <rect x="14" y="38" width="52" height="6" fill="#94a3b8" rx="3"/>
      <line x1="40" y1="4" x2="40" y2="14" stroke="#0D47A1" stroke-width="3" stroke-linecap="round"/>
      <line x1="40" y1="66" x2="40" y2="76" stroke="#0D47A1" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Quadrante: Ressonância -->
  <g transform="translate(60, 330)">
    <rect width="220" height="200" rx="14" fill="white" opacity="0.95"/>
    <text x="20" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0D47A1" letter-spacing="1.5">— 03</text>
    <text x="20" y="58" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="800" fill="#0a0a0a">RESSONÂNCIA</text>
    <text x="20" y="78" font-family="Inter, sans-serif" font-size="11" fill="#404040">Magnetic Resonance (MR)</text>
    <text x="20" y="92" font-family="Inter, sans-serif" font-size="11" fill="#404040">Aberta ou fechada</text>
    <!-- ícone MRI -->
    <g transform="translate(140, 110)" opacity="0.9">
      <rect x="6" y="20" width="68" height="50" rx="14" fill="#94a3b8"/>
      <rect x="20" y="34" width="40" height="22" rx="6" fill="#0a0a0a"/>
      <rect x="0" y="60" width="80" height="6" fill="#cbd5e1" rx="3"/>
      <circle cx="40" cy="45" r="2" fill="#0D47A1"/>
    </g>
  </g>

  <!-- Quadrante: Ultrassom -->
  <g transform="translate(320, 330)">
    <rect width="220" height="200" rx="14" fill="white" opacity="0.95"/>
    <text x="20" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0D47A1" letter-spacing="1.5">— 04</text>
    <text x="20" y="58" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="800" fill="#0a0a0a">ULTRASSOM</text>
    <text x="20" y="78" font-family="Inter, sans-serif" font-size="11" fill="#404040">Ultrasound (US)</text>
    <text x="20" y="92" font-family="Inter, sans-serif" font-size="11" fill="#404040">Doppler colorido e 4D</text>
    <!-- ícone US -->
    <g transform="translate(150, 110)" opacity="0.9">
      <path d="M 10 70 L 30 30 L 50 70 Z" fill="#0a0a0a"/>
      <path d="M 18 60 Q 30 50 42 60" stroke="#94a3b8" stroke-width="2" fill="none"/>
      <path d="M 22 50 Q 30 42 38 50" stroke="#94a3b8" stroke-width="2" fill="none"/>
      <circle cx="30" cy="78" r="3" fill="#94a3b8"/>
    </g>
  </g>

  <text x="300" y="580" font-family="Inter, sans-serif" font-size="11" fill="#e8f0fe" text-anchor="middle">Compatível com DICOM Basic Print Management (PS3.4)</text>
</svg>
