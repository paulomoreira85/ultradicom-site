<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <defs>
    <filter id="shadowPS" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadowPS)">
    <rect x="20" y="20" width="760" height="500" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="20" y="20" width="760" height="40" rx="12" fill="#475569"/>
    <rect x="20" y="48" width="760" height="12" fill="#475569"/>
    <text x="40" y="45" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="white">Setup — Ultra DICOM</text>
    <text x="752" y="45" font-family="Segoe UI, sans-serif" font-size="11" fill="white" text-anchor="middle">×</text>

    <!-- Tabs -->
    <rect x="20" y="60" width="760" height="32" fill="#f1f5f9"/>
    <text x="55" y="80" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">General</text>
    <text x="125" y="80" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Printer</text>
    <rect x="170" y="60" width="80" height="32" fill="white"/>
    <text x="210" y="80" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#0a0a0a" text-anchor="middle">Paper</text>
    <line x1="170" y1="92" x2="170" y2="92" stroke="white" stroke-width="2"/>
    <text x="290" y="80" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Rules</text>
    <text x="365" y="80" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Store SCP</text>

    <!-- Conteúdo da aba Paper -->
    <text x="60" y="135" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#0a0a0a">Mapeamento de tamanhos DICOM → Papel real</text>
    <text x="60" y="153" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">Cada tamanho de filme DICOM enviado pelo equipamento é mapeado para um tamanho de papel real da impressora.</text>

    <!-- Grid -->
    <g font-family="Segoe UI, sans-serif" font-size="13" fill="#0a0a0a">
      <!-- Linha 1 -->
      <text x="80" y="195" font-weight="700">14INX17IN</text>
      <text x="190" y="195" fill="#64748b">→</text>
      <rect x="220" y="180" width="200" height="22" fill="white" stroke="#cbd5e1"/>
      <text x="232" y="196" font-weight="600">A4</text>
      <text x="408" y="196" fill="#64748b" font-size="11" text-anchor="middle">▼</text>

      <!-- Linha 2 -->
      <text x="80" y="230" font-weight="700">14INX14IN</text>
      <text x="190" y="230" fill="#64748b">→</text>
      <rect x="220" y="215" width="200" height="22" fill="white" stroke="#cbd5e1"/>
      <text x="232" y="231" font-weight="600">A4</text>
      <text x="408" y="231" fill="#64748b" font-size="11" text-anchor="middle">▼</text>

      <!-- Linha 3 -->
      <text x="80" y="265" font-weight="700">11INX17IN</text>
      <text x="190" y="265" fill="#64748b">→</text>
      <rect x="220" y="250" width="200" height="22" fill="white" stroke="#cbd5e1"/>
      <text x="232" y="266" font-weight="600">A4</text>
      <text x="408" y="266" fill="#64748b" font-size="11" text-anchor="middle">▼</text>

      <!-- Linha 4 -->
      <text x="80" y="300" font-weight="700">8_5INX11IN</text>
      <text x="190" y="300" fill="#64748b">→</text>
      <rect x="220" y="285" width="200" height="22" fill="white" stroke="#0D47A1" stroke-width="1.5"/>
      <text x="232" y="301" font-weight="600" fill="#0D47A1">LETTER</text>
      <text x="408" y="301" fill="#64748b" font-size="11" text-anchor="middle">▼</text>

      <!-- Linha 5 -->
      <text x="80" y="335" font-weight="700">8INX10IN</text>
      <text x="190" y="335" fill="#64748b">→</text>
      <rect x="220" y="320" width="200" height="22" fill="white" stroke="#cbd5e1"/>
      <text x="232" y="336" font-weight="600">A4</text>
      <text x="408" y="336" fill="#64748b" font-size="11" text-anchor="middle">▼</text>

      <!-- Linha 6 -->
      <text x="80" y="370" font-weight="700" fill="#0D47A1">DEFAULT</text>
      <text x="190" y="370" fill="#64748b">→</text>
      <rect x="220" y="355" width="200" height="22" fill="white" stroke="#cbd5e1"/>
      <text x="232" y="371" font-weight="600">A4</text>
      <text x="408" y="371" fill="#64748b" font-size="11" text-anchor="middle">▼</text>
    </g>

    <!-- Lateral direita: lista de papéis disponíveis -->
    <rect x="500" y="170" width="240" height="270" fill="#f8fafc" stroke="#e2e8f0" rx="6"/>
    <text x="520" y="195" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#475569" letter-spacing="1.5">PAPÉIS DISPONÍVEIS</text>
    <g font-family="Segoe UI, sans-serif" font-size="12" fill="#0a0a0a">
      <text x="520" y="220">A4 (210×297mm)</text>
      <text x="520" y="245">LETTER (216×279mm)</text>
      <text x="520" y="270">A3 (297×420mm)</text>
      <text x="520" y="295">TABLOID (279×432mm)</text>
      <text x="520" y="320">LEGAL (216×356mm)</text>
      <text x="520" y="345">A5 (148×210mm)</text>
      <text x="520" y="370">A6 (105×148mm)</text>
      <text x="520" y="395">A3+ (329×483mm)</text>
      <text x="520" y="420" fill="#64748b" font-style="italic">+ tamanho customizado em mm</text>
    </g>

    <!-- Botões inferiores -->
    <rect x="320" y="470" width="80" height="30" rx="4" fill="#0D47A1"/>
    <text x="360" y="490" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">✔ OK</text>
    <rect x="410" y="470" width="80" height="30" rx="4" fill="#fff" stroke="#cbd5e1"/>
    <text x="450" y="490" font-family="Segoe UI, sans-serif" font-size="12" fill="#475569" text-anchor="middle">✘ Cancel</text>
  </g>
</svg>
