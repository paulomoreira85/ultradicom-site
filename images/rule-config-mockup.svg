<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <defs>
    <linearGradient id="winBgRC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadowRC" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadowRC)">
    <rect x="20" y="20" width="760" height="500" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="20" y="20" width="760" height="40" rx="12" fill="#475569"/>
    <rect x="20" y="48" width="760" height="12" fill="#475569"/>
    <text x="40" y="45" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="white">Rule Configuration</text>
    <circle cx="752" cy="40" r="6" fill="#94a3b8"/>
    <text x="752" y="45" font-family="Segoe UI, sans-serif" font-size="11" fill="white" text-anchor="middle">×</text>

    <!-- ==== Endpoint + Impressora group ==== -->
    <rect x="40" y="80" width="340" height="280" fill="none" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <rect x="60" y="74" width="170" height="14" fill="white"/>
    <text x="65" y="86" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#0a0a0a">Endpoint + Impressora</text>

    <!-- Porta -->
    <text x="60" y="115" font-family="Segoe UI, sans-serif" font-size="11" fill="#1e293b">Porta:</text>
    <rect x="160" y="103" width="100" height="22" fill="white" stroke="#cbd5e1"/>
    <text x="170" y="118" font-family="Consolas, monospace" font-size="12" fill="#0a0a0a">1041</text>
    <rect x="245" y="103" width="15" height="11" fill="#e2e8f0"/>
    <rect x="245" y="114" width="15" height="11" fill="#e2e8f0"/>
    <text x="252" y="111" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">▲</text>
    <text x="252" y="123" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">▼</text>
    <text x="60" y="138" font-family="Segoe UI, sans-serif" font-size="9" fill="#94a3b8">(porta DICOM única para este endpoint)</text>

    <!-- AET -->
    <text x="60" y="165" font-family="Segoe UI, sans-serif" font-size="11" fill="#1e293b">AET (Called):</text>
    <rect x="160" y="153" width="200" height="22" fill="white" stroke="#0D47A1" stroke-width="1.5"/>
    <text x="168" y="168" font-family="Consolas, monospace" font-size="12" font-weight="700" fill="#0a0a0a">RESSONANCIA</text>
    <text x="60" y="188" font-family="Segoe UI, sans-serif" font-size="9" fill="#94a3b8">(o equipamento usa este AET como destino)</text>

    <!-- Printer -->
    <text x="60" y="215" font-family="Segoe UI, sans-serif" font-size="11" fill="#1e293b">Printer:</text>
    <rect x="160" y="203" width="200" height="22" fill="white" stroke="#cbd5e1"/>
    <text x="168" y="218" font-family="Segoe UI, sans-serif" font-size="11" fill="#0a0a0a">Brother HL-L8360 (Rede)</text>
    <text x="350" y="218" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">▼</text>

    <!-- Paper Size -->
    <text x="60" y="255" font-family="Segoe UI, sans-serif" font-size="11" fill="#1e293b">Paper Size:</text>
    <rect x="160" y="243" width="200" height="22" fill="white" stroke="#cbd5e1"/>
    <text x="168" y="258" font-family="Segoe UI, sans-serif" font-size="11" fill="#0a0a0a">CLIENT</text>
    <text x="350" y="258" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">▼</text>

    <!-- True Size -->
    <rect x="160" y="290" width="14" height="14" fill="white" stroke="#475569"/>
    <text x="180" y="302" font-family="Segoe UI, sans-serif" font-size="11" fill="#1e293b">True Size Print</text>

    <!-- ==== Image Processing group ==== -->
    <rect x="400" y="80" width="340" height="220" fill="none" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <rect x="420" y="74" width="120" height="14" fill="white"/>
    <text x="425" y="86" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#0a0a0a">Image Processing</text>

    <text x="420" y="115" font-family="Segoe UI, sans-serif" font-size="11" fill="#1e293b">Gamma:</text>
    <rect x="520" y="103" width="180" height="22" fill="white" stroke="#cbd5e1"/>
    <text x="528" y="118" font-family="Consolas, monospace" font-size="11" fill="#0a0a0a">1.00</text>

    <text x="420" y="155" font-family="Segoe UI, sans-serif" font-size="11" fill="#1e293b">Contrast:</text>
    <rect x="520" y="143" width="180" height="22" fill="white" stroke="#cbd5e1"/>
    <text x="528" y="158" font-family="Consolas, monospace" font-size="11" fill="#0a0a0a">0</text>

    <text x="420" y="195" font-family="Segoe UI, sans-serif" font-size="11" fill="#1e293b">Saturation:</text>
    <rect x="520" y="183" width="180" height="22" fill="white" stroke="#cbd5e1"/>
    <text x="528" y="198" font-family="Consolas, monospace" font-size="11" fill="#0a0a0a">0</text>

    <text x="420" y="235" font-family="Segoe UI, sans-serif" font-size="11" fill="#1e293b">Filter:</text>
    <rect x="520" y="223" width="180" height="22" fill="white" stroke="#cbd5e1"/>
    <text x="528" y="238" font-family="Segoe UI, sans-serif" font-size="11" fill="#0a0a0a">None</text>
    <text x="690" y="238" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">▼</text>

    <!-- ==== Forced Colors group ==== -->
    <rect x="220" y="380" width="360" height="100" fill="none" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <rect x="240" y="374" width="100" height="14" fill="white"/>
    <text x="245" y="386" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#0a0a0a">Forced Colors</text>

    <text x="240" y="412" font-family="Segoe UI, sans-serif" font-size="11" fill="#1e293b">Color:</text>
    <rect x="380" y="400" width="180" height="22" fill="white" stroke="#cbd5e1"/>
    <text x="388" y="415" font-family="Segoe UI, sans-serif" font-size="11" fill="#0a0a0a">BLACK&amp;WHITE</text>
    <text x="550" y="415" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">▼</text>

    <text x="240" y="446" font-family="Segoe UI, sans-serif" font-size="11" fill="#1e293b">Border:</text>
    <rect x="380" y="434" width="180" height="22" fill="white" stroke="#cbd5e1"/>
    <text x="388" y="449" font-family="Segoe UI, sans-serif" font-size="11" fill="#0a0a0a">BLACK</text>

    <!-- Botões -->
    <rect x="280" y="495" width="120" height="32" rx="4" fill="#0D47A1"/>
    <text x="340" y="515" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">✔ OK</text>
    <rect x="420" y="495" width="120" height="32" rx="4" fill="#fff" stroke="#cbd5e1"/>
    <text x="480" y="515" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#475569" text-anchor="middle">✘ Cancel</text>
  </g>
</svg>
