<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Cruz médica sutil de fundo -->
  <g opacity="0.18" fill="#ffffff">
    <rect x="48" y="8" width="6" height="20" rx="2"/>
    <rect x="41" y="15" width="20" height="6" rx="2"/>
  </g>
  <!-- UD -->
  <text x="32" y="44" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="url(#cross)" text-anchor="middle" letter-spacing="-1">UD</text>
</svg>
