<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <defs>
    <linearGradient id="winBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Janela do app -->
  <g filter="url(#shadow)">
    <rect x="20" y="20" width="760" height="500" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="20" y="20" width="760" height="40" rx="12" fill="#1e293b"/>
    <rect x="20" y="48" width="760" height="12" fill="#1e293b"/>
    <circle cx="40" cy="40" r="6" fill="#ef4444"/>
    <circle cx="60" cy="40" r="6" fill="#fbbf24"/>
    <circle cx="80" cy="40" r="6" fill="#22c55e"/>
    <text x="120" y="45" font-family="Segoe UI, sans-serif" font-size="13" fill="#cbd5e1">Ultra DICOM — Print SCP</text>

    <!-- Top bar -->
    <rect x="20" y="60" width="760" height="60" fill="url(#winBg)"/>
    <text x="40" y="92" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#15803d">Status: Rodando — 4 endpoints: RESSONANCIA:1041, TOMOGRAFIA:1042, RAIOX:1043, ULTRASSOM:1044</text>

    <!-- Botões direita -->
    <rect x="430" y="75" width="80" height="32" rx="6" fill="#15803d"/>
    <text x="470" y="96" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">▶ Start</text>
    <rect x="520" y="75" width="80" height="32" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="560" y="96" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">■ Stop</text>
    <rect x="610" y="75" width="80" height="32" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="650" y="96" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">⚙ Setup</text>
    <rect x="700" y="75" width="60" height="32" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="730" y="96" font-family="Segoe UI, sans-serif" font-size="12" fill="#475569" text-anchor="middle">📊 ℹ</text>

    <!-- Banner trial -->
    <rect x="20" y="120" width="760" height="36" fill="#fed7aa"/>
    <text x="40" y="143" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#9a3412">⏳ AVALIAÇÃO GRATUITA — 12 dias restantes. Clique aqui para inserir sua chave de ativação →</text>

    <!-- Header lista jobs -->
    <rect x="20" y="156" width="760" height="22" fill="#f1f5f9"/>
    <text x="40" y="172" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#475569">Trabalhos de impressão recebidos</text>

    <!-- Grid de colunas -->
    <line x1="20" y1="200" x2="780" y2="200" stroke="#e2e8f0"/>
    <text x="40" y="195" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#64748b">Hora</text>
    <text x="100" y="195" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#64748b">AET</text>
    <text x="200" y="195" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#64748b">FilmBoxes</text>
    <text x="290" y="195" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#64748b">Job UID</text>
    <text x="540" y="195" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#64748b">Status</text>
    <text x="640" y="195" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#64748b">Info</text>

    <!-- Jobs -->
    <rect x="20" y="200" width="760" height="22" fill="#f0fdf4"/>
    <text x="40" y="215" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">14:23:11</text>
    <text x="100" y="215" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">RESSONANCIA</text>
    <text x="220" y="215" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">2</text>
    <text x="290" y="215" font-family="Consolas, monospace" font-size="9" fill="#64748b">1.2.840.10008.5.1.4.1.1.1...</text>
    <text x="540" y="215" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#15803d">Done</text>
    <text x="640" y="215" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">NORMAL</text>

    <rect x="20" y="222" width="760" height="22" fill="#f0fdf4"/>
    <text x="40" y="237" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">14:18:42</text>
    <text x="100" y="237" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">TOMOGRAFIA</text>
    <text x="220" y="237" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">4</text>
    <text x="290" y="237" font-family="Consolas, monospace" font-size="9" fill="#64748b">1.2.840.10008.5.1.4.1.1.2...</text>
    <text x="540" y="237" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#15803d">Done</text>
    <text x="640" y="237" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">NORMAL</text>

    <rect x="20" y="244" width="760" height="22" fill="#fef9c3"/>
    <text x="40" y="259" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">14:15:09</text>
    <text x="100" y="259" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">RAIOX</text>
    <text x="220" y="259" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">1</text>
    <text x="290" y="259" font-family="Consolas, monospace" font-size="9" fill="#64748b">1.2.840.10008.5.1.4.1.1.3...</text>
    <text x="540" y="259" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#a16207">Printing</text>
    <text x="640" y="259" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">QUEUED</text>

    <rect x="20" y="266" width="760" height="22" fill="#f0fdf4"/>
    <text x="40" y="281" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">14:09:00</text>
    <text x="100" y="281" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">ULTRASSOM</text>
    <text x="220" y="281" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e293b">1</text>
    <text x="290" y="281" font-family="Consolas, monospace" font-size="9" fill="#64748b">1.2.840.10008.5.1.4.1.1.4...</text>
    <text x="540" y="281" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#15803d">Done</text>
    <text x="640" y="281" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">NORMAL</text>

    <!-- Splitter -->
    <rect x="20" y="296" width="760" height="22" fill="#f1f5f9"/>
    <text x="40" y="312" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#475569">Log</text>

    <!-- Log -->
    <rect x="20" y="318" width="760" height="190" fill="#0f172a"/>
    <g font-family="Consolas, monospace" font-size="10">
      <text x="32" y="338" fill="#94a3b8">[14:23:09] [INF] Recebida associação de AE: GE_TOSHIBA IP: 192.168.1.42</text>
      <text x="32" y="354" fill="#94a3b8">[14:23:09] [INF] Associação aceita de GE_TOSHIBA</text>
      <text x="32" y="370" fill="#94a3b8">[14:23:09] [INF] Film session criada: 1.2.840.10008.5.1...</text>
      <text x="32" y="386" fill="#94a3b8">[14:23:10] [INF] Film box criado: 1.2.840.10008.5.1...</text>
      <text x="32" y="402" fill="#94a3b8">[14:23:10] [INF] Set image box 1.2.840.10008.5.1...</text>
      <text x="32" y="418" fill="#94a3b8">[14:23:11] [INF] Print job para film session 1.2.840.10008...</text>
      <text x="32" y="434" fill="#94a3b8">[14:23:11] [INF] Regra resolvida: CalledAE=RESSONANCIA → impressora=Brother HL-L8360</text>
      <text x="32" y="450" fill="#a3e635">[14:23:12] [INF] Print Job 12345 Status Done: NORMAL</text>
      <text x="32" y="466" fill="#94a3b8">[14:23:12] [INF] Recebida associação de AE: SIEMENS_TC IP: 192.168.1.51</text>
      <text x="32" y="482" fill="#94a3b8">[14:23:13] [INF] Associação aceita de SIEMENS_TC</text>
      <text x="32" y="498" fill="#a3e635">[14:23:14] [INF] Print Job 67890 Status Done: NORMAL</text>
    </g>
  </g>
</svg>
